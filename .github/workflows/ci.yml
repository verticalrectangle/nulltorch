name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only token; CI references no secrets, so there is nothing to leak.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # jsonschema is the only non-stdlib dependency (board validation).
      # torch is NOT needed: CI grades against the committed fixtures.
      - run: python -m pip install --upgrade jsonschema
      - run: bash scripts/ci.sh
