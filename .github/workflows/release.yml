name: Release

on:
  push:
    tags: ["v*"]

# contents:write is needed ONLY to create the release. It uses the built-in,
# ephemeral GITHUB_TOKEN — no personal API keys, no third-party release action.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade jsonschema
      # Gate: do not cut a release unless the full CI suite passes.
      - run: bash scripts/ci.sh
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
